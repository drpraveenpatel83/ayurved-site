<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Ayurveda Quiz</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" href="/assets/img/logo.png" type="image/png">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="logo">
    <img src="/assets/img/logo.png" alt="Logo" onerror="this.style.display='none'" style="width:56px;margin:0 auto 8px">
    <h1>🌿 Ayurveda Quiz</h1>
    <p class="text-muted text-small">BAMS, AIAPGET, Govt Exam Preparation</p>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
    <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>

  <!-- Login Form -->
  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="apna@email.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Login →</button>
    <div class="text-center mt-2">
      <a href="#" onclick="switchTab('register')" class="text-small">Account nahi hai? Register karein</a>
    </div>
  </form>

  <!-- Register Form -->
  <form id="register-form" class="hidden" onsubmit="doRegister(event)">
    <div class="form-group">
      <label>Pura Naam</label>
      <input type="text" id="reg-name" placeholder="Aapka naam" required autocomplete="name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="apna@email.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>Phone (optional)</label>
      <input type="tel" id="reg-phone" placeholder="10-digit mobile number" maxlength="10">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-pass" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
    </div>
    <button type="submit" class="btn btn-primary btn-block btn-lg" id="reg-btn">Register →</button>
    <div class="text-center mt-2">
      <a href="#" onclick="switchTab('login')" class="text-small">Pehle se account hai? Login karein</a>
    </div>
  </form>
</div>

<script src="/assets/js/app.js"></script>
<script>
function switchTab(tab) {
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Logging in...';

  const res = await apiPost('public/auth/login.php', {
    email: document.getElementById('login-email').value,
    password: document.getElementById('login-pass').value
  });

  if (res.success) {
    Auth.setToken(res.data.token);
    Auth.setUser(res.data.user);
    Toast.success('Login successful!');
    const redirect = sessionStorage.getItem('aq_redirect') || '/';
    sessionStorage.removeItem('aq_redirect');
    setTimeout(() => window.location.href = redirect, 600);
  } else {
    Toast.error(res.message || 'Login failed');
    btn.disabled = false; btn.textContent = 'Login →';
  }
}

async function doRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';

  const res = await apiPost('public/auth/register.php', {
    name: document.getElementById('reg-name').value,
    email: document.getElementById('reg-email').value,
    phone: document.getElementById('reg-phone').value,
    password: document.getElementById('reg-pass').value
  });

  if (res.success) {
    Auth.setToken(res.data.token);
    Auth.setUser(res.data.user);
    Toast.success('Account ban gaya! Welcome 🎉');
    const redirect = sessionStorage.getItem('aq_redirect') || '/';
    sessionStorage.removeItem('aq_redirect');
    setTimeout(() => window.location.href = redirect, 800);
  } else {
    Toast.error(res.message || 'Registration failed');
    btn.disabled = false; btn.textContent = 'Register →';
  }
}

// Redirect if already logged in
if (Auth.isLoggedIn()) window.location.href = '/';
</script>
</body>
</html>
