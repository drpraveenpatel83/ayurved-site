<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
</head>
<body>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="/" class="nav-brand">
      <img src="/assets/img/logo.png" alt="Ayurved Studies" class="nav-brand-logo">
      <div class="nav-brand-text">
        <span class="site-name">Ayurved Studies</span>
        <span class="site-tagline">NCISM · AIAPGET · BAMS · AYUSH</span>
      </div>
    </a>
    <div class="nav-menu" id="nav-menu">
      <a href="/">Home</a>
      <a href="/pages/bams.html">BAMS</a>
      <a href="/pages/aiapget.html" class="active">AIAPGET</a>
      <a href="/pages/quiz.html">Quiz</a>
      <a href="/pages/login.html" class="nav-mobile-login">Login / Register</a>
    </div>
    <div class="nav-actions">
      <div id="nav-login-btn">
        <a href="/pages/login.html" class="btn btn-primary btn-sm">Login</a>
      </div>
      <div class="hidden" id="nav-user-btn">
        <a href="/pages/profile.html" class="btn btn-outline btn-sm">👤 <span id="nav-user-name"></span></a>
      </div>
    </div>
    <button class="nav-hamburger" id="nav-burger" aria-label="Menu">☰</button>
  </div>
</nav>

<div class="page-header" style="background:linear-gradient(135deg,#C0392B,#922B21);padding:28px 0">
  <div class="container">
    <div class="breadcrumb"><a href="/" style="color:rgba(255,255,255,0.7)">Home</a><span style="color:rgba(255,255,255,0.5)"> › </span><span style="color:#fff">AIAPGET</span></div>
    <h1 style="color:#fff;font-size:1.5rem;margin:8px 0 4px">🎯 AIAPGET Preparation</h1>
    <p style="color:rgba(255,255,255,0.8);font-size:0.9rem">Previous Year Questions + Mock Tests</p>
  </div>
</div>

<div class="container section">

  <!-- Info box -->
  <div class="card mb-3" style="border-left:4px solid #C0392B">
    <h3 style="color:#C0392B;margin-bottom:8px">All India Ayurveda PG Entrance Test</h3>
    <p class="text-muted" style="font-size:0.9rem">200 MCQs · 3 Hours · Negative Marking. Access PYQ papers and full-length mock tests here.</p>
  </div>

  <div id="aiapget-main">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', loadAIAPGET);

async function loadAIAPGET() {
  const main = document.getElementById('aiapget-main');

  if (!Auth.isLoggedIn()) {
    showLoginGate(main, 'Please login to access AIAPGET tests');
    return;
  }

  const res = await apiGet('public/categories.php?type=aiapget&include_children=1');

  if (!res.success || !res.data.length) {
    main.innerHTML = '<div class="empty-state"><div class="icon">🎯</div><h3>Tests coming soon</h3></div>';
    return;
  }

  const parent = res.data[0];
  const children = parent.children || [];

  const pyqs  = children.filter(c => c.name.toLowerCase().includes('pyq') || c.name.toLowerCase().includes('previous'));
  const mocks = children.filter(c => c.name.toLowerCase().includes('mock'));
  const others= children.filter(c => !pyqs.includes(c) && !mocks.includes(c));

  main.innerHTML = `
    ${pyqs.length ? `
    <div class="section-header"><div class="section-title">📄 Previous Year Questions</div></div>
    <div class="quiz-list mb-3">
      ${pyqs.map(c => `
        <div class="quiz-list-item">
          <div class="info"><h4>${c.name}</h4><p>${c.question_count || 0} Questions</p></div>
          <div class="meta">
            <span class="badge red">PYQ</span>
            <a href="/pages/quiz.html?type=previous_year&category=${c.id}" class="btn btn-primary btn-sm">Start →</a>
          </div>
        </div>`).join('')}
    </div>` : ''}

    ${mocks.length ? `
    <div class="section-header"><div class="section-title">🎯 Mock Tests</div></div>
    <div class="quiz-list mb-3">
      ${mocks.map(c => `
        <div class="quiz-list-item">
          <div class="info"><h4>${c.name}</h4><p>${c.question_count || 0} Questions</p></div>
          <div class="meta">
            <span class="badge blue">Mock</span>
            <a href="/pages/quiz.html?type=mock&category=${c.id}" class="btn btn-primary btn-sm">Start →</a>
          </div>
        </div>`).join('')}
    </div>` : ''}

    ${others.length ? `
    <div class="section-header"><div class="section-title">📚 Practice Sets</div></div>
    <div class="quiz-list">
      ${others.map(c => `
        <div class="quiz-list-item">
          <div class="info"><h4>${c.name}</h4><p>${c.question_count || 0} Questions</p></div>
          <div class="meta">
            <a href="/pages/quiz.html?type=practice&category=${c.id}" class="btn btn-primary btn-sm">Start →</a>
          </div>
        </div>`).join('')}
    </div>` : ''}`;
}
</script>
</body>
</html>
