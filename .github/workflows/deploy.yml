name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Manual trigger button bhi hoga GitHub Actions tab mein

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: FTP Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: public_html/
          local-dir: ./
          timeout: 120000
          log-level: verbose
          state-name: .ftp-deploy-sync-v3.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            api/config.php
            uploads/**
            database/set-admin-password.php
            database/wp-rest-import.php
            database/wp-xml-import.php
            database/wordpress-posts.xml
            test-site/**
            .github/**
            .vscode/**
            .DS_Store
            __MACOSX/**

      - name: Purge Hostinger Cache
        if: always()
        run: |
          curl -s \
            -X POST "https://api.hosting24.com/v1/websites/cache/purge" \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"domain":"ayurvedstudies.com"}' || echo "Cache purge done"
